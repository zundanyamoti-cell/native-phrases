<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ネイティブフレーズ</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ネイティブフレーズ">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root{
  --rose:#c0718a; --rose-light:#faedf1;
  --lavender:#8a7ab8; --lavender-light:#eeebf8;
  --sage:#6aa88c; --sage-light:#e8f4ee;
  --amber:#b88a50; --amber-light:#fdf3e3;
  --bg:#f9f6fc; --surface:#fff; --border:#ede8f2;
  --text:#28253a; --muted:#a09aac;
  --correct:#5a9e7a; --wrong:#c06060;
  --card-shadow:0 2px 20px rgba(90,70,130,0.08);
  --card-shadow-md:0 4px 36px rgba(90,70,130,0.11);
}
body{ font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif; min-height:100vh; background:var(--bg); display:flex; justify-content:center; overflow-x:hidden; color:var(--text); }
.app{ width:100%; max-width:430px; min-height:100vh; position:relative; }
.screen{ display:none; flex-direction:column; align-items:center; padding:0 20px 40px; min-height:100vh; }
.screen.active{ display:flex; }

/* AUTH */
.auth-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; width:100%; }
.auth-card{ background:var(--surface); border-radius:24px; padding:36px 24px 28px; width:100%; box-shadow:var(--card-shadow-md); border:1px solid var(--border); }
.auth-title{ font-size:1.9rem; font-weight:900; letter-spacing:-1px; background:linear-gradient(135deg,var(--rose),var(--lavender)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; margin-bottom:6px; }
.auth-sub{ font-size:0.78rem; color:var(--muted); text-align:center; margin-bottom:28px; }
.auth-avatar-wrap{ display:flex; flex-direction:column; align-items:center; margin-bottom:20px; }
.auth-avatar{ width:72px; height:72px; border-radius:50%; object-fit:cover; border:3px solid var(--border); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:8px; }
.auth-avatar svg{ opacity:0.35; }
.auth-avatar img{ width:100%; height:100%; object-fit:cover; }
.avatar-hint{ font-size:0.68rem; color:var(--muted); }
.auth-input{ width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:12px; font-size:0.93rem; color:var(--text); background:var(--bg); margin-bottom:10px; outline:none; transition:border-color .15s; }
.auth-input:focus{ border-color:var(--lavender); background:#fff; }
.auth-btn{ width:100%; padding:15px; background:linear-gradient(135deg,var(--rose),var(--lavender)); color:#fff; font-size:0.95rem; font-weight:800; border:none; border-radius:13px; cursor:pointer; box-shadow:0 4px 16px rgba(130,90,170,0.2); margin-top:6px; transition:transform .1s; }
.auth-btn:active{ transform:scale(0.97); }
.auth-switch{ text-align:center; margin-top:18px; font-size:0.82rem; color:var(--muted); }
.auth-switch span{ color:var(--lavender); font-weight:700; cursor:pointer; }
.auth-error{ color:var(--wrong); font-size:0.8rem; font-weight:600; text-align:center; margin-bottom:10px; display:none; }

/* HOME */
.user-bar{ display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:16px; padding:10px 14px; margin:20px 0 16px; width:100%; border:1px solid var(--border); box-shadow:var(--card-shadow); }
.user-bar-avatar{ width:38px; height:38px; border-radius:50%; border:2px solid var(--border); background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.user-bar-avatar img{ width:100%; height:100%; object-fit:cover; }
.user-bar-name{ font-size:0.88rem; font-weight:800; flex:1; }
.logout-btn{ font-size:0.72rem; color:var(--muted); font-weight:700; cursor:pointer; padding:5px 10px; border:1px solid var(--border); border-radius:8px; background:transparent; }
.logout-btn:active{ background:var(--bg); }
.home-hero{ text-align:center; padding:36px 0 20px; width:100%; }
.home-hero h1{ font-size:2.6rem; font-weight:900; letter-spacing:-2px; background:linear-gradient(135deg,var(--rose),var(--lavender)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-hero .subtitle{ font-size:0.82rem; color:var(--muted); margin-top:6px; letter-spacing:0.5px; }
.home-card{ background:var(--surface); border-radius:24px; padding:26px 22px; width:100%; box-shadow:var(--card-shadow); border:1px solid var(--border); }
.stats-row{ display:flex; justify-content:space-around; margin-bottom:24px; padding-bottom:22px; border-bottom:1.5px solid var(--border); }
.stat{ text-align:center; }
.stat-num{ font-size:1.9rem; font-weight:900; color:var(--rose); }
.stat-label{ font-size:0.63rem; color:var(--muted); margin-top:3px; font-weight:700; letter-spacing:0.5px; }
.mode-btn{ width:100%; padding:15px 16px; border:1.5px solid var(--border); border-radius:16px; cursor:pointer; transition:all .12s; display:flex; align-items:center; gap:12px; margin-bottom:10px; background:var(--surface); color:var(--text); box-shadow:0 1px 6px rgba(90,70,130,0.05); }
.mode-btn:active{ transform:scale(0.97); }
.mode-btn.quiz-btn{ border-color:#e8cdd6; background:#fffafe; }
.mode-btn.flash-btn{ border-color:#d8d0ee; background:#faf8ff; }
.mode-btn .btn-icon{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mode-btn.quiz-btn .btn-icon{ background:var(--rose-light); }
.mode-btn.flash-btn .btn-icon{ background:var(--lavender-light); }
.mode-btn .btn-text{ text-align:left; }
.mode-btn .btn-title{ font-size:0.93rem; font-weight:800; display:block; color:var(--text); }
.mode-btn .btn-desc{ font-size:0.71rem; color:var(--muted); display:block; margin-top:2px; }
.word-count-select{ display:flex; gap:5px; margin-bottom:14px; background:var(--bg); border-radius:12px; padding:4px; }
.count-opt{ flex:1; padding:9px; border:none; border-radius:8px; font-size:0.8rem; font-weight:700; cursor:pointer; background:transparent; color:var(--muted); transition:all .15s; }
.count-opt.active{ background:var(--surface); color:var(--text); box-shadow:0 1px 8px rgba(90,70,130,0.08); }

/* QUIZ */
.quiz-topbar,.flash-topbar,.search-topbar{ width:100%; display:flex; align-items:center; gap:10px; padding:16px 0 12px; }
.back-btn{ width:36px; height:36px; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 1px 4px rgba(90,70,130,0.06); }
.back-btn svg{ fill:currentColor; }
.back-btn:active{ background:var(--bg); }
.prog-wrap{ flex:1; background:var(--border); border-radius:99px; height:6px; overflow:hidden; }
.prog-bar{ height:100%; background:linear-gradient(90deg,var(--rose),var(--lavender)); border-radius:99px; transition:width .4s cubic-bezier(.4,0,.2,1); }
.score-chip{ background:var(--rose-light); color:var(--rose); font-size:0.78rem; font-weight:800; padding:5px 12px; border-radius:99px; white-space:nowrap; border:1px solid #e8c8d4; }
.word-card{ background:var(--surface); border-radius:22px; padding:30px 22px 26px; width:100%; text-align:center; box-shadow:var(--card-shadow-md); margin-bottom:14px; border:1px solid var(--border); }
.word-tag{ display:inline-block; background:var(--lavender-light); color:var(--lavender); font-size:0.66rem; font-weight:800; padding:4px 12px; border-radius:99px; letter-spacing:0.5px; margin-bottom:16px; }
.word-english{ font-size:1.7rem; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:1.25; margin-bottom:14px; }
.speak-btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 18px; background:var(--amber-light); color:var(--amber); font-size:0.78rem; font-weight:800; border:1.5px solid #edd8b0; border-radius:99px; cursor:pointer; }
.speak-btn:active{ transform:scale(0.94); background:#f5e6c4; }
.speak-icon{ width:13px; height:13px; fill:var(--amber); }
.choices{ width:100%; display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.choice-btn{ padding:15px 17px; background:var(--surface); color:var(--text); font-size:0.92rem; font-weight:600; border:1.5px solid var(--border); border-radius:13px; cursor:pointer; text-align:left; transition:all .12s; box-shadow:0 1px 4px rgba(90,70,130,0.04); line-height:1.35; }
.choice-btn:active:not([disabled]){ transform:scale(0.98); border-color:var(--lavender); background:var(--lavender-light); }
.choice-btn.correct{ border-color:var(--correct); background:var(--sage-light); color:#1a5438; }
.choice-btn.wrong{ border-color:var(--wrong); background:#fdf0f0; color:#7a2020; }
.choice-btn[disabled]{ cursor:default; }
.feedback-card{ background:var(--surface); border-radius:18px; padding:18px 20px; width:100%; box-shadow:var(--card-shadow); border:1px solid var(--border); margin-bottom:12px; display:none; animation:popIn .22s cubic-bezier(.34,1.56,.64,1); }
.feedback-card.visible{ display:block; }
@keyframes popIn{ from{ transform:scale(0.92) translateY(10px); opacity:0; } to{ transform:scale(1) translateY(0); opacity:1; } }
.feedback-label{ font-size:0.93rem; font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.feedback-label.ok{ color:var(--correct); }
.feedback-label.ng{ color:var(--wrong); }
.scene-tag{ display:inline-block; background:var(--amber-light); color:var(--amber); font-size:0.6rem; font-weight:800; padding:3px 10px; border-radius:99px; letter-spacing:0.5px; margin-bottom:8px; border:1px solid #edd8b0; }
.scene-body{ font-size:0.86rem; color:#5a5060; line-height:1.6; }
.next-btn{ width:100%; padding:16px; background:linear-gradient(135deg,var(--rose),var(--lavender)); color:#fff; font-size:0.95rem; font-weight:800; border:none; border-radius:15px; cursor:pointer; box-shadow:0 5px 18px rgba(130,90,170,0.22); display:none; margin-bottom:24px; letter-spacing:0.3px; }
.next-btn:active{ transform:scale(0.97); }

/* FLASHCARD */
.flash-counter{ flex:1; text-align:center; color:var(--muted); font-size:0.8rem; font-weight:700; }
.flashcard{ background:var(--surface); border-radius:22px; width:100%; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:34px 26px; box-shadow:var(--card-shadow-md); cursor:pointer; transition:transform .15s; text-align:center; margin-bottom:12px; position:relative; user-select:none; border:1px solid var(--border); }
.flashcard:active{ transform:scale(0.98); }
.flash-tap-hint{ font-size:0.68rem; color:#d0cad8; font-weight:600; margin-bottom:12px; letter-spacing:0.3px; }
.flash-word{ font-size:1.6rem; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:1.3; }
.flash-meaning{ font-size:1.15rem; font-weight:800; color:var(--lavender); margin-top:10px; line-height:1.4; }
.scene-strip{ background:var(--surface); border-radius:16px; padding:15px 18px; width:100%; margin-bottom:12px; border:1.5px solid var(--amber-light); }
.scene-strip .scene-tag-white{ font-size:0.6rem; font-weight:800; color:var(--amber); letter-spacing:0.5px; margin-bottom:6px; }
.scene-strip .scene-text-white{ font-size:0.85rem; color:#5a5060; line-height:1.55; }
.flash-nav{ display:flex; gap:8px; width:100%; margin-bottom:32px; }
.nav-btn{ flex:1; padding:14px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:0.86rem; font-weight:700; border-radius:13px; cursor:pointer; box-shadow:0 1px 4px rgba(90,70,130,0.05); }
.nav-btn:active{ background:var(--bg); transform:scale(0.97); }
.nav-btn.center{ flex:0.8; border-color:var(--amber-light); color:var(--amber); background:var(--amber-light); }
.learned-btn{ width:100%; padding:14px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); font-size:0.86rem; font-weight:800; border-radius:13px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; box-shadow:0 1px 4px rgba(90,70,130,0.04); }
.learned-btn.checked{ border-color:var(--sage); background:var(--sage-light); color:#1a5438; }
.learned-btn:active{ transform:scale(0.97); }
.learned-badge{ position:absolute; top:14px; right:14px; background:var(--sage-light); color:var(--sage); font-size:0.6rem; font-weight:800; padding:3px 10px; border-radius:99px; display:none; border:1px solid #b8dac8; }
.learned-badge.show{ display:inline-block; }
.flash-cat-badge{ position:absolute; top:14px; left:14px; background:var(--lavender-light); color:var(--lavender); font-size:0.6rem; font-weight:800; padding:3px 10px; border-radius:99px; display:none; border:1px solid #d0c8ee; letter-spacing:0.3px; }
.flash-cat-badge.show{ display:inline-block; }

/* RESULT */
.result-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
.result-card{ background:var(--surface); border-radius:24px; padding:40px 24px 32px; width:100%; text-align:center; box-shadow:var(--card-shadow-md); border:1px solid var(--border); }
.result-title{ font-size:0.68rem; font-weight:700; color:var(--muted); letter-spacing:1.5px; margin-bottom:20px; }
.result-score{ font-size:5rem; font-weight:900; line-height:1; background:linear-gradient(135deg,var(--rose),var(--lavender)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
.result-denom{ font-size:0.92rem; color:var(--muted); margin-bottom:10px; }
.result-pct{ display:inline-block; padding:5px 18px; border-radius:99px; font-size:0.85rem; font-weight:800; margin-bottom:16px; }
.result-pct.s{ background:var(--sage-light); color:#1a5438; }
.result-pct.a{ background:var(--lavender-light); color:#3d2e8a; }
.result-pct.b{ background:var(--amber-light); color:#7a5010; }
.result-pct.c{ background:#fdf0f0; color:#7a2020; }
.result-msg{ font-size:1rem; font-weight:700; color:var(--text); margin-bottom:28px; }
.result-actions{ display:flex; flex-direction:column; gap:10px; }
.btn-retry{ padding:16px; background:linear-gradient(135deg,var(--rose),var(--lavender)); color:#fff; font-size:0.93rem; font-weight:800; border:none; border-radius:14px; cursor:pointer; box-shadow:0 5px 18px rgba(130,90,170,0.22); }
.btn-retry:active{ transform:scale(0.97); }
.btn-home{ padding:15px; background:transparent; color:var(--muted); font-size:0.9rem; font-weight:700; border:1.5px solid var(--border); border-radius:14px; cursor:pointer; }
.btn-home:active{ background:var(--bg); }

/* SEARCH */
.search-input-wrap{ width:100%; position:relative; margin-bottom:14px; }
.search-input{ width:100%; padding:14px 46px 14px 18px; border:1.5px solid var(--border); border-radius:14px; font-size:1rem; color:var(--text); background:var(--surface); outline:none; box-shadow:var(--card-shadow); }
.search-input:focus{ border-color:var(--lavender); }
.search-clear{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.1rem; padding:4px; display:none; }
.search-hint{ text-align:center; color:var(--muted); font-size:0.82rem; margin-top:40px; }
.search-results{ width:100%; display:flex; flex-direction:column; gap:10px; }
.search-result-card{ background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 18px; box-shadow:var(--card-shadow); }
.sr-word{ font-size:1.15rem; font-weight:900; color:var(--text); margin-bottom:4px; line-height:1.3; }
.sr-jp{ font-size:0.9rem; font-weight:700; color:var(--lavender); margin-bottom:8px; }
.sr-scene{ font-size:0.78rem; color:#7a6a80; line-height:1.5; background:var(--amber-light); border-radius:8px; padding:7px 10px; }
.sr-speak{ margin-top:10px; display:inline-flex; align-items:center; gap:5px; font-size:0.75rem; font-weight:700; color:var(--amber); background:var(--amber-light); border:1px solid #edd8b0; border-radius:99px; padding:5px 12px; cursor:pointer; }
.no-results{ text-align:center; color:var(--muted); font-size:0.88rem; margin-top:30px; }
.search-count{ font-size:0.72rem; color:var(--muted); margin-bottom:10px; font-weight:700; }

.confetti-wrap{ position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; overflow:hidden; z-index:100; }
.confetti-piece{ position:absolute; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall{ 0%{ transform:translateY(-20px) rotate(0deg); opacity:1; } 100%{ transform:translateY(110vh) rotate(720deg); opacity:0; } }
#avatarInput{ display:none; }
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">ネイティブフレーズ</div>
      <div class="auth-sub">ログインして学習を続けよう</div>
      <div class="auth-error" id="loginError"></div>
      <input class="auth-input" type="text" id="loginUser" placeholder="ユーザー名" autocomplete="username">
      <input class="auth-input" type="password" id="loginPass" placeholder="パスワード" autocomplete="current-password">
      <button class="auth-btn" onclick="doLogin()">ログイン</button>
      <div class="auth-switch">アカウントがない？ <span onclick="showRegister()">新規登録</span></div>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div class="screen" id="registerScreen">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">新規登録</div>
      <div class="auth-sub">アカウントを作成しよう</div>
      <div class="auth-error" id="regError"></div>
      <div class="auth-avatar-wrap">
        <div class="auth-avatar" id="regAvatarPreview" onclick="document.getElementById('avatarInput').click()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="#a09aac"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <div class="avatar-hint">タップして写真を選ぶ（任意）</div>
      </div>
      <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(this)">
      <input class="auth-input" type="text" id="regUser" placeholder="ユーザー名" autocomplete="username">
      <input class="auth-input" type="password" id="regPass" placeholder="パスワード" autocomplete="new-password">
      <input class="auth-input" type="password" id="regPass2" placeholder="パスワード（確認）" autocomplete="new-password">
      <button class="auth-btn" onclick="doRegister()">登録する</button>
      <div class="auth-switch">すでにアカウントがある？ <span onclick="showLogin()">ログイン</span></div>
    </div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="homeScreen">
  <div class="user-bar">
    <div class="user-bar-avatar" id="homeAvatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#a09aac"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
    <div class="user-bar-name" id="homeUserName">—</div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="home-hero">
    <h1>ネイティブフレーズ</h1>
    <div class="subtitle">ネイティブが最初に覚える英会話300フレーズ</div>
  </div>
  <div class="home-card">
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="statWords">—</div><div class="stat-label">収録フレーズ</div></div>
      <div class="stat"><div class="stat-num" id="statLearned" style="color:var(--sage);">0</div><div class="stat-label">覚えた</div></div>
      <div class="stat"><div class="stat-num" id="statBest">—</div><div class="stat-label">最高正答率</div></div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:0.72rem;font-weight:700;color:#bbb;letter-spacing:0.5px;margin-bottom:8px;">出題の向き</div>
      <div class="word-count-select">
        <button class="count-opt active" data-d="en2jp" onclick="setDir('en2jp',this)">英語 → 日本語</button>
        <button class="count-opt" data-d="jp2en" onclick="setDir('jp2en',this)">日本語 → 英語</button>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:0.72rem;font-weight:700;color:#bbb;letter-spacing:0.5px;margin-bottom:8px;">出題数</div>
      <div class="word-count-select">
        <button class="count-opt" data-n="10" onclick="setCount(10,this)">10問</button>
        <button class="count-opt active" data-n="20" onclick="setCount(20,this)">20問</button>
        <button class="count-opt" data-n="100" onclick="setCount(100,this)">100問</button>
        <button class="count-opt" data-n="9999" onclick="setCount(9999,this)">全問</button>
      </div>
    </div>

// ===== AUTH / STORAGE =====
const LS_USERS = "npUsers";
const LS_CUR = "npCurrentUser";
let currentUser = null;
let regAvatarData = "";

function loadUsers(){ try{ return JSON.parse(localStorage.getItem(LS_USERS)||"{}"); }catch(e){ return {}; } }
function saveUsers(u){ localStorage.setItem(LS_USERS, JSON.stringify(u)); }
function getUser(){ const u=loadUsers(); return u[currentUser]||null; }
function setUser(data){ const u=loadUsers(); u[currentUser]=data; saveUsers(u); }

function showScreen(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); window.scrollTo(0,0); }
function showLogin(){ showScreen("loginScreen"); }
function showRegister(){ showScreen("registerScreen"); }

function previewAvatar(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ regAvatarData=e.target.result; document.getElementById("regAvatarPreview").innerHTML='<img src="'+regAvatarData+'">'; };
  r.readAsDataURL(f);
}
function doRegister(){
  const err=document.getElementById("regError");
  const name=document.getElementById("regUser").value.trim();
  const p1=document.getElementById("regPass").value, p2=document.getElementById("regPass2").value;
  const showErr=m=>{ err.textContent=m; err.style.display="block"; };
  if(!name) return showErr("ユーザー名を入力してください");
  if(p1.length<1) return showErr("パスワードを入力してください");
  if(p1!==p2) return showErr("パスワードが一致しません");
  const users=loadUsers();
  if(users[name]) return showErr("そのユーザー名は使われています");
  users[name]={ pass:p1, avatar:regAvatarData, learned:[], best:0 };
  saveUsers(users);
  currentUser=name; localStorage.setItem(LS_CUR,name);
  err.style.display="none"; enterHome();
}
function doLogin(){
  const err=document.getElementById("loginError");
  const name=document.getElementById("loginUser").value.trim();
  const pass=document.getElementById("loginPass").value;
  const users=loadUsers();
  if(!users[name]||users[name].pass!==pass){ err.textContent="ユーザー名またはパスワードが違います"; err.style.display="block"; return; }
  currentUser=name; localStorage.setItem(LS_CUR,name); err.style.display="none"; enterHome();
}
function doLogout(){ currentUser=null; localStorage.removeItem(LS_CUR); document.getElementById("loginUser").value=""; document.getElementById("loginPass").value=""; showLogin(); }

function enterHome(){
  const u=getUser();
  document.getElementById("homeUserName").textContent=currentUser;
  const av=document.getElementById("homeAvatar");
  if(u&&u.avatar){ av.innerHTML='<img src="'+u.avatar+'">'; }
  else{ av.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="#a09aac"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>'; }
  refreshStats(); showScreen("homeScreen");
}
function refreshStats(){
  const u=getUser()||{learned:[],best:0};
  document.getElementById("statWords").textContent=VOCAB.length;
  document.getElementById("statLearned").textContent=(u.learned||[]).length;
  document.getElementById("statBest").textContent=(u.best||0)+"%";
}
function isLearned(en){ const u=getUser(); return u&&u.learned&&u.learned.indexOf(en)>=0; }
function setLearned(en,on){
  const u=getUser(); if(!u) return; u.learned=u.learned||[];
  const i=u.learned.indexOf(en);
  if(on&&i<0) u.learned.push(en);
  if(!on&&i>=0) u.learned.splice(i,1);
  setUser(u);
}

// ===== HELPERS =====
let quizCount=20;
let quizDir="en2jp";
function setCount(n,el){ quizCount=n; document.querySelectorAll("[data-n]").forEach(b=>b.classList.remove("active")); el.classList.add("active"); }
function setDir(d,el){ quizDir=d; document.querySelectorAll("[data-d]").forEach(b=>b.classList.remove("active")); el.classList.add("active"); }
function promptText(item){ return quizDir==="en2jp"?item.en:item.jp; }
function answerText(item){ return quizDir==="en2jp"?item.jp:item.en; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function goHome(){ speechSynthesis.cancel(); refreshStats(); showScreen("homeScreen"); }
function speak(text){
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="en-US"; u.rate=0.92; speechSynthesis.speak(u); }catch(e){}
}

// ===== QUIZ =====
let quizList=[], qIndex=0, qScore=0, answered=false, lastUnlearnt=false;
function startQuiz(unlearntOnly){
  lastUnlearnt=!!unlearntOnly;
  let pool=VOCAB.slice();
  if(unlearntOnly) pool=pool.filter(v=>!isLearned(v.en));
  if(pool.length===0){ alert("対象のフレーズがありません。先に「覚えた」を外すか別のモードを選んでください。"); return; }
  pool=shuffle(pool);
  if(quizCount<pool.length) pool=pool.slice(0,quizCount);
  quizList=pool; qIndex=0; qScore=0;
  showScreen("quizScreen"); renderQ();
}
function renderQ(){
  answered=false;
  const item=quizList[qIndex];
  const A=answerText(item);
  document.getElementById("qTag").textContent="Q "+(qIndex+1)+" / "+quizList.length;
  document.getElementById("qWord").textContent=promptText(item);
  document.getElementById("scoreChip").textContent=qScore+" / "+quizList.length;
  document.getElementById("progBar").style.width=((qIndex)/quizList.length*100)+"%";
  document.getElementById("feedCard").classList.remove("visible");
  document.getElementById("nextBtn").style.display="none";
  // 日本語→英語のときは、答え(英語)を先に読み上げないよう発音ボタンは回答後に表示
  const sb=document.getElementById("quizSpeakBtn");
  sb.style.display = quizDir==="en2jp" ? "inline-flex" : "none";
  // choices
  const others=shuffle(VOCAB.filter(v=>answerText(v)!==A)).slice(0,3);
  const opts=shuffle([item].concat(others));
  const box=document.getElementById("choices"); box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="choice-btn"; b.textContent=answerText(o);
    b.onclick=()=>pickAnswer(b,o,item);
    box.appendChild(b);
  });
  if(quizDir==="en2jp") speak(item.en);
}
function pickAnswer(btn,chosen,item){
  if(answered) return; answered=true;
  const A=answerText(item);
  const correct=answerText(chosen)===A;
  document.querySelectorAll("#choices .choice-btn").forEach(b=>{
    b.disabled=true;
    if(b.textContent===A) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  if(correct) qScore++;
  document.getElementById("scoreChip").textContent=qScore+" / "+quizList.length;
  const fl=document.getElementById("feedLabel");
  fl.className="feedback-label "+(correct?"ok":"ng");
  fl.textContent=correct?"◎ 正解！  "+A:"✕ 不正解  →  "+A;
  document.getElementById("feedScene").textContent=item.scene;
  document.getElementById("feedCard").classList.add("visible");
  document.getElementById("nextBtn").style.display="block";
  document.getElementById("quizSpeakBtn").style.display="inline-flex";
  document.getElementById("progBar").style.width=((qIndex+1)/quizList.length*100)+"%";
}
function nextQ(){
  if(qIndex<quizList.length-1){ qIndex++; renderQ(); }
  else showResult();
}
function showResult(){
  const total=quizList.length, pct=Math.round(qScore/total*100);
  document.getElementById("rScore").textContent=qScore;
  document.getElementById("rDenom").textContent="/ "+total+"問正解";
  const pe=document.getElementById("rPct");
  let cls,msg;
  if(pct>=90){ cls="s"; msg="パーフェクトに近い！素晴らしい🎉"; }
  else if(pct>=70){ cls="a"; msg="いい調子！この調子で続けよう"; }
  else if(pct>=50){ cls="b"; msg="あと一歩！復習でしっかり定着"; }
  else{ cls="c"; msg="まずはフレーズ帳で確認してみよう"; }
  pe.className="result-pct "+cls; pe.textContent="正答率 "+pct+"%";
  document.getElementById("rMsg").textContent=msg;
  const u=getUser(); if(u){ if(pct>(u.best||0)){ u.best=pct; setUser(u); } }
  showScreen("resultScreen");
  if(pct>=70) confetti();
}

// ===== FLASHCARD =====
let flashList=[], fIndex=0, flipped=false;
function startFlash(unlearntOnly){
  let pool=VOCAB.slice();
  if(unlearntOnly) pool=pool.filter(v=>!isLearned(v.en));
  if(pool.length===0){ alert("対象のフレーズがありません。"); return; }
  flashList=pool; fIndex=0; showScreen("flashScreen"); renderFlash();
}
function renderFlash(){
  flipped=false;
  const item=flashList[fIndex];
  document.getElementById("flashCounter").textContent=(fIndex+1)+" / "+flashList.length;
  document.getElementById("flashWord").textContent=promptText(item);
  const m=document.getElementById("flashMeaning"); m.textContent=answerText(item); m.style.display="none";
  document.getElementById("flashHint").style.display="block";
  document.getElementById("flashScene").textContent=item.scene;
  const cb=document.getElementById("flashCatBadge");
  if(item.cat){ cb.textContent=item.cat; cb.classList.add("show"); } else cb.classList.remove("show");
  const lb=document.getElementById("flashLearnedBadge");
  const btn=document.getElementById("learnedBtn");
  if(isLearned(item.en)){ lb.classList.add("show"); btn.classList.add("checked"); btn.lastChild.textContent="覚えた済み"; }
  else{ lb.classList.remove("show"); btn.classList.remove("checked"); btn.lastChild.textContent="覚えた！"; }
  if(quizDir==="en2jp") speak(item.en);
}
function flipCard(){
  flipped=!flipped;
  const m=document.getElementById("flashMeaning");
  document.getElementById("flashHint").style.display=flipped?"none":"block";
  m.style.display=flipped?"block":"none";
}
function flashNext(){ if(fIndex<flashList.length-1){ fIndex++; renderFlash(); } }
function flashPrev(){ if(fIndex>0){ fIndex--; renderFlash(); } }
function shuffleFlash(){ flashList=shuffle(flashList); fIndex=0; renderFlash(); }
function speakFlash(){ speak(flashList[fIndex].en); }
function toggleLearned(){
  const item=flashList[fIndex]; const now=!isLearned(item.en);
  setLearned(item.en,now); renderFlash();
}

// ===== SEARCH =====
function showSearch(){ showScreen("searchScreen"); document.getElementById("searchInput").value=""; document.getElementById("searchResults").innerHTML='<div class="search-hint">英語（例：Go ahead）または日本語（例：どうぞ）で検索</div>'; document.getElementById("searchClear").style.display="none"; }
function clearSearch(){ document.getElementById("searchInput").value=""; doSearch(""); }
function doSearch(q){
  q=q.trim().toLowerCase();
  document.getElementById("searchClear").style.display=q?"block":"none";
  const box=document.getElementById("searchResults");
  if(!q){ box.innerHTML='<div class="search-hint">英語（例：Go ahead）または日本語（例：どうぞ）で検索</div>'; return; }
  const res=VOCAB.filter(v=>v.en.toLowerCase().indexOf(q)>=0||v.jp.indexOf(q)>=0||(v.scene&&v.scene.indexOf(q)>=0));
  if(res.length===0){ box.innerHTML='<div class="no-results">該当するフレーズが見つかりません</div>'; return; }
  let html='<div class="search-count">'+res.length+'件</div>';
  res.forEach(v=>{
    const safe=v.en.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    html+='<div class="search-result-card"><div class="sr-word">'+v.en+'</div><div class="sr-jp">'+v.jp+'</div><div class="sr-scene">'+v.scene+'</div><button class="sr-speak" onclick="speak(\''+safe+'\')">▶ 発音を聞く</button></div>';
  });
  box.innerHTML=html;
}

// ===== MISC =====
function speakCurrent(){ if(quizList[qIndex]) speak(quizList[qIndex].en); }
function confetti(){
  const wrap=document.getElementById("confettiWrap"); wrap.innerHTML="";
  const colors=["#c0718a","#8a7ab8","#6aa88c","#b88a50","#e8a0b8"];
  for(let i=0;i<60;i++){
    const p=document.createElement("div"); p.className="confetti-piece";
    p.style.left=Math.random()*100+"%";
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration=(2+Math.random()*2)+"s";
    p.style.animationDelay=(Math.random()*0.5)+"s";
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML="",4500);
}

// ===== INIT =====
(function init(){
  const saved=localStorage.getItem(LS_CUR);
  if(saved&&loadUsers()[saved]){ currentUser=saved; enterHome(); }
  else showLogin();
})();
</script>
